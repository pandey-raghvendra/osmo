version: 2

project_name: osmo

before:
  hooks:
    - go mod tidy

builds:
  - id: osmo
    main: ./cmd/osmo
    binary: osmo
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}

archives:
  - id: osmo
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md

brews:
  - name: osmo
    repository:
      owner: pandey-raghvendra
      name: homebrew-osmo
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/pandey-raghvendra/osmo"
    description: "Terraform drift absorber — rewrites .tf files to match real-world state"
    license: "Apache-2.0"
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    commit_msg_template: "Brew formula update for osmo {{ .Tag }}"
    directory: Formula
    install: |
      bin.install "osmo"
    test: |
      system "#{bin}/osmo", "-version"

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - Merge pull request
      - Merge branch

release:
  github:
    owner: pandey-raghvendra
    name: osmo
  draft: false
  prerelease: auto
  name_template: "v{{ .Version }}"
